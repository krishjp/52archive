project: 52Archive
description: |
  Deck-only card game archive for web and iOS with a graph-based game editor.
  The editor lets game designers define games as branched flows (setup → turns → scoring → end),
  with support for conditional branches, card actions, and AI hints for future bot players.

version: "0.1.0"
last_updated: "2026-05-31"
handoff_by: "Copilot"

## PROJECT STRUCTURE

workspace:
  type: "pnpm monorepo"
  root: "/Users/krishpatel/Projects/52archive"
  packages:
    - name: "core"
      path: "packages/core"
      description: "Rule-graph engine, game templates, sample data (Judgement)"
      key_files:
        - "src/types.ts (GraphNode, GraphEdge, Game)"
        - "src/graph.ts (graph building & traversal)"
        - "src/judgement.ts (Judgement game model)"
        - "src/flowTemplates.ts (editor node templates)"
    
    - name: "ui"
      path: "packages/ui"
      description: "Shared design tokens, theme, visual primitives"
      key_files:
        - "src/theme.ts (color, spacing, typography)"
    
    - name: "web (Next.js)"
      path: "apps/web"
      description: "Archive experience + interactive game editor"
      key_pages:
        - "app/page.tsx (archive home)"
        - "app/editor/page.tsx (game editor entry)"
      key_components:
        - "app/components/graph-editor.tsx (main editor component)"
    
    - name: "mobile (Expo)"
      path: "apps/mobile"
      description: "iOS native app shell (Expo)"
      status: "scaffold only"

database:
  type: "PostgreSQL (docker-compose)"
  tables:
    - name: "games"
      columns: "id, title, subtitle, summary, minPlayers, maxPlayers, playTimeMinutes, difficulty, tags, deckCount, needsPaperScorekeeping, status (draft|pending_review|approved|rejected), featured"
    
    - name: "game_versions"
      columns: "id, gameId, version, ruleGraph (JSON), createdAt, updatedAt"
  
  init_script: "db/init/001_schema.sql"
  status: "ready but not deployed"

## RECENT CHANGES (This Session)

### Graph Editor Improvements

#### File: apps/web/app/components/graph-editor.tsx

1. **Panning & Zooming**
   - Added click/touch-drag panning via pointer events (`onPointerDown`, `onPointerMove`, `onPointerUp`)
   - Kept mouse fallbacks for legacy browsers
   - Ctrl/Cmd + scroll wheel to zoom (no scroll conflicts on macOS)
   - Helps future iOS app compatibility

2. **Node Layout**
   - Removed decorative node rotations (straight, aligned blocks)
   - SVG Bézier curves for edge connections (from node center to node center)
   - Improved branch placement: spreads branches horizontally and vertically (pyramid-like layout)

3. **Node Interaction**
   - Drag nodes to reposition (free placement)
   - Click empty canvas to deselect
   - Library buttons insert after the selected node (with automatic shifting)
   - Select a "turns" node → add card actions (place, swap, discard, draw, reveal, pass)

4. **Card Action System**
   - Added `CardAction` type with 6 common actions
   - `addCardAction()` creates action nodes with auto-wired edges
   - Actions appear as child nodes below turn stages

### Files Updated

- `.gitignore`: expanded to include Next.js artifacts, pnpm locks, IDE temp files
- `README.md`: added editor feature overview, canvas controls, workflow examples
- `HANDOFF.yaml`: this document

## KNOWN ISSUES & TODO

### Critical Path Items

1. **Branch Connections (BLOCKING)**
   - Current: branches created via `addBranch()` generate single edges only
   - Required: branches should support multiple outgoing edges (one node → many conditions)
   - Issue: UI needs "add branch condition" button on branch nodes; edge creation/deletion needed
   - File: `apps/web/app/components/graph-editor.tsx` (addBranch, branch UI panel)
   - Estimate: 1-2 hours (design, UI buttons, edge management)

2. **Edge Deletion**
   - No way to remove edges currently
   - Recommend: context menu on nodes or dedicated delete button in sidebar
   - File: `apps/web/app/components/graph-editor.tsx` (sidebar panel)

3. **Node Deletion**
   - No way to remove nodes
   - Recommend: delete button in sidebar, handle cascade (delete edges touching node)
   - File: `apps/web/app/components/graph-editor.tsx` (sidebar panel)

4. **Persistence**
   - Editor state is in-memory only (React state)
   - No save/load yet
   - Next: API endpoint to POST graph to `game_versions` table

