## CODE ENTRY POINTS

### Editor Component

**File**: `apps/web/app/components/graph-editor.tsx`

Key functions:
- `GraphEditor()`: main component, manages graph state + pan/zoom
- `addNode()`: insert or append a node
- `addBranch()`: create a branch (conditional split) — **TODO: support multiple edges**
- `handleCanvasPointerDown/Move/Up()`: click-drag panning (pointer events)
- `startNodeDrag()`: node repositioning via global mouse listeners
- `addCardAction()`: create action child nodes on turn stages

State:
- `graph`: nodes + edges
- `selectedId`: currently selected node
- `panOffset`, `zoom`: canvas pan/zoom state
- `draggingNodeId`: node being dragged

### Type Definitions

**File**: `packages/core/src/types.ts`

```typescript
type GraphNode = {
  id, kind, title, body, x, y,
  stageKey?, occurrence?, actor?, aiHint?
}

type GraphEdge = {
  id, from, to, label?, condition?, branchType?
}

type Game = {
  id, title, subtitle, summary,
  minPlayers, maxPlayers, playTimeMinutes, difficulty,
  tags, deckCount, needsPaperScorekeeping,
  graph: RuleGraph, featured
}
```

### Sample Game Data

**File**: `packages/core/src/judgement.ts`

Judgement model:
- 2–6 players
- 20 min per round, ~5 rounds
- Trick-taking + bidding
- Graph includes: setup, optional teams, per-round bidding/play/scoring, round progression, final scoring

## RUNNING THE PROJECT

### Local Dev

```bash
cd /Users/krishpatel/Projects/52archive

# Install deps
npm install

# Start database
docker compose up -d db

# Start web app (http://localhost:3000)
npm run dev:web

# Start iOS app (Expo)
npm run dev:ios
```

### Editor Testing

1. Navigate to http://localhost:3000/editor
2. Try:
   - Panning: click-drag canvas
   - Zooming: Ctrl+scroll
   - Insert node: select a node, click a stage button
   - Move node: drag a node
   - Add branch: click "Add branch" on a node
   - Add action: select a turn node, click an action button

